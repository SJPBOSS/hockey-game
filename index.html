<!DOCTYPE html>
<html>
<head>
    <title>SENTINEL ARENA: STEAL & SCORE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        #scoreboard { font-size: 2.5rem; border-left: 5px solid #ff0000; padding-left: 15px; }
        #status { color: #00ffff; font-size: 1rem; margin-top: 5px; text-transform: uppercase; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-size: 5rem; display: none; text-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreboard">SCORE: <span id="points">0</span></div>
        <div id="status">STEAL THE PUCK FROM THE WHITE GHOST!</div>
    </div>
    <div id="msg">GOAL!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        let score = 0, hasPuck = false, aiHasPuck = false, isShooting = false, shake = 0;
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.PointLight(0xffffff, 1.2, 200);
        sun.position.set(0, 40, 0); scene.add(sun);

        const ice = new THREE.Mesh(new THREE.PlaneGeometry(60, 120), new THREE.MeshStandardMaterial({ color: 0x050505 }));
        ice.rotation.x = -Math.PI/2; scene.add(ice);
        ice.add(new THREE.GridHelper(120, 30, 0xff0000, 0x111111).rotateX(Math.PI/2));

        const net = new THREE.Mesh(new THREE.BoxGeometry(14, 6, 2), new THREE.MeshStandardMaterial({ color: 0xffffff, wireframe: true }));
        net.position.set(0, 3, -55); scene.add(net);

        function createPlayer(col) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 1), new THREE.MeshStandardMaterial({ color: col }));
            body.position.y = 1.25; group.add(body);
            const stick = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 0.2), new THREE.MeshStandardMaterial({ color: 0x888888 }));
            stick.position.set(1, 0.5, -1); stick.rotation.x = Math.PI/4; group.add(stick);
            return group;
        }

        const player = createPlayer(0xff0000); player.position.set(0, 0, 40); scene.add(player);
        const ghostAI = createPlayer(0xffffff); ghostAI.position.set(10, 0, -10); scene.add(ghostAI);
        const goalie = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 1.5), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x001111 }));
        goalie.position.set(0, 2, -54); scene.add(goalie);

        const puck = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.3, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        puck.position.set(0, 15, 0); scene.add(puck);

        function resetPuck() {
            hasPuck = false; aiHasPuck = false; isShooting = false;
            puck.position.set(0, 15, 0);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Movement
            const speed = 0.55;
            if(keys['KeyW'] || keys['ArrowUp']) player.position.z -= speed;
            if(keys['KeyS'] || keys['ArrowDown']) player.position.z += speed;
            if(keys['KeyA'] || keys['ArrowLeft']) player.position.x -= speed;
            if(keys['KeyD'] || keys['ArrowRight']) player.position.x += speed;

            // Camera follow with screen shake
            camera.position.set(player.position.x + (Math.random()-0.5)*shake, 35, player.position.z + 45);
            camera.lookAt(player.position.x, 0, player.position.z - 10);
            if(shake > 0) shake *= 0.9;

            // Goalie AI
            goalie.position.x = THREE.MathUtils.lerp(goalie.position.x, THREE.MathUtils.clamp(puck.position.x, -7, 7), 0.1);

            // GHOST AI LOGIC (The Puck Hunter)
            if (!hasPuck && !aiHasPuck && !isShooting && puck.position.y < 1) {
                ghostAI.position.x = THREE.MathUtils.lerp(ghostAI.position.x, puck.position.x, 0.04);
                ghostAI.position.z = THREE.MathUtils.lerp(ghostAI.position.z, puck.position.z, 0.04);
            } else if (aiHasPuck) {
                ghostAI.position.z = THREE.MathUtils.lerp(ghostAI.position.z, -50, 0.03); // AI moves to net
                if (ghostAI.position.z < -40) { aiHasPuck = false; isShooting = true; } // AI shoots
            }

            // PUCK GRAVITY
            if (puck.position.y > 0.3) puck.position.y -= 0.2;

            // POSSESSION LOGIC
            // Player steals/picks up
            if (!isShooting && player.position.distanceTo(puck.position) < 3.5 && puck.position.y < 1) {
                if(aiHasPuck) { shake = 0.5; document.getElementById('status').innerText = 'POKE CHECK! STOLEN!'; }
                hasPuck = true; aiHasPuck = false;
            }
            // AI steals/picks up
            if (!hasPuck && !isShooting && ghostAI.position.distanceTo(puck.position) < 3.5 && puck.position.y < 1) {
                aiHasPuck = true; document.getElementById('status').innerText = 'THE GHOST HAS THE PUCK!';
            }

            // SHOOTING
            if(keys['Space'] && hasPuck) { hasPuck = false; isShooting = true; }

            if(isShooting) {
                puck.position.z -= 2.6;
                if(puck.position.distanceTo(goalie.position) < 4.5) { resetPuck(); document.getElementById('status').innerText = 'SAVED BY GOALIE!'; }
                if(puck.position.z < -54 && Math.abs(puck.position.x) < 7) {
                    score++; document.getElementById('points').innerText = score;
                    document.getElementById('msg').style.display = 'block';
                    shake = 1.0;
                    setTimeout(() => { document.getElementById('msg').style.display = 'none'; resetPuck(); }, 1000);
                    isShooting = false;
                }
                if(puck.position.z < -85) resetPuck();
            } else if (hasPuck) {
                puck.position.set(player.position.x, 0.3, player.position.z - 3);
            } else if (aiHasPuck) {
                puck.position.set(ghostAI.position.x, 0.3, ghostAI.position.z - 3);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
