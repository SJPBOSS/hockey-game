<!DOCTYPE html>
<html>
<head>
    <title>Sentinel Slapshot Ultra</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0ff; font-family: monospace; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">SYSTEM ACTIVE: WASD TO MOVE</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202); // Dark grey so we know it's working
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING (The "Nothing" Fix) ---
        // If you see nothing, it's often because the lights are missing.
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0x00ffff, 1);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // --- 3. OBJECTS ---
        // Rink
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 30), new THREE.MeshStandardMaterial({ color: 0x444444 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Player
        const player = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        player.position.y = 0.5;
        scene.add(player);

        // Puck
        const puck = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({ color: 0xffff00 }));
        puck.position.set(0, 0.3, 0);
        scene.add(puck);

        // --- 4. CONTROLS ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        // --- 5. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            if(keys['w']) player.position.z -= 0.1;
            if(keys['s']) player.position.z += 0.1;
            if(keys['a']) player.position.x -= 0.1;
            if(keys['d']) player.position.x += 0.1;

            renderer.render(scene, camera);
        }

        // Handle window resizing (Crucial for Vercel/Mobile)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        console.log("Ultra Scene Initialized");
    </script>
</body>
</html>
