<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL SLAPSHOT: LEVEL 2</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', sans-serif; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #ff0000; text-shadow: 0 0 10px #ff0000; pointer-events: none;
        }
        #instructions {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: #ff0000; font-size: 1rem; text-shadow: 0 0 5px #ff0000;
        }
        #msg {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: #fff; font-size: 3rem; display: none; text-shadow: 0 0 20px #ff0000;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>SENTINEL SLAPSHOT: ACTIVE DEPLOYMENT</h1>
        <div id="status">GOALIE ONLINE | WASD TO MOVE</div>
    </div>
    <div id="msg">TARGET NEUTRALIZED</div>
    <div id="instructions">WASD TO SKATE | SPACE TO SHOOT</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.AmbientLight(0x404040, 2));
        const pointLight = new THREE.PointLight(0xff0000, 2, 50);
        pointLight.position.set(0, 10, 10);
        scene.add(pointLight);

        // Rink
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 40), new THREE.MeshStandardMaterial({ color: 0x050505 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        floor.add(new THREE.GridHelper(40, 20, 0xff0000, 0x220000).rotateX(Math.PI/2));

        // Goal
        const goal = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 1), new THREE.MeshStandardMaterial({ color: 0xff0000, wireframe: true }));
        goal.position.set(0, 2, -18);
        scene.add(goal);

        // Goalie (The moving bot)
        const goalie = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 1), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff }));
        goalie.position.set(0, 1, -16);
        scene.add(goalie);

        // Player (Your character)
        const player = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        player.position.set(0, 1, 15);
        scene.add(player);

        // Puck (Sentinel Core)
        const puck = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.2, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff }));
        puck.position.set(0, 0.1, 14);
        scene.add(puck);

        camera.position.set(0, 10, 25);
        camera.lookAt(0, 0, 0);

        // Input Logic
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        let isShooting = false;
        let goalieDir = 1;
        let goalieSpeed = 0.15;

        function animate() {
            requestAnimationFrame(animate);

            // Move Player
            if (keys['KeyW'] || keys['ArrowUp']) player.position.z -= 0.2;
            if (keys['KeyS'] || keys['ArrowDown']) player.position.z += 0.2;
            if (keys['KeyA'] || keys['ArrowLeft']) player.position.x -= 0.2;
            if (keys['KeyD'] || keys['ArrowRight']) player.position.x += 0.2;

            // Goalie Logic (Slides back and forth)
            goalie.position.x += goalieSpeed * goalieDir;
            if (Math.abs(goalie.position.x) > 2.5) goalieDir *= -1;

            // Shoot Logic (Spacebar)
            if (keys['Space'] && !isShooting) {
                isShooting = true;
                puck.position.copy(player.position);
                puck.position.y = 0.1;
            }

            if (isShooting) {
                puck.position.z -= 0.8;
                
                // Collision with Goalie
                let distToGoalie = puck.position.distanceTo(goalie.position);
                if (distToGoalie < 1.5) {
                    isShooting = false;
                    puck.position.set(0, 0.1, 100); 
                    document.getElementById('status').innerText = 'CORE INTERCEPTED';
                    setTimeout(() => document.getElementById('status').innerText = 'GOALIE ONLINE', 1000);
                }

                // Score Goal
                if (puck.position.z < -17.5 && Math.abs(puck.position.x) < 3) {
                    isShooting = false;
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => {
                        document.getElementById('msg').style.display = 'none';
                        puck.position.set(0, 0.1, 100);
                    }, 1500);
                }

                // Reset miss
                if (puck.position.z < -25) isShooting = false;
            } else {
                puck.position.x = player.position.x;
                puck.position.z = player.position.z - 1;
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
