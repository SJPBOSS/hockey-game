<!DOCTYPE html>
<html>
<head>
    <title>SENTINEL ARENA: CREASE LOCK</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        #scoreboard { font-size: 2.5rem; border-left: 5px solid #ff0000; padding-left: 15px; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-size: 5rem; display: none; text-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreboard">SCORE: <span id="points">0</span></div>
        <div style="color: #ff0000; margin-top: 5px;">PRO GOALIE ACTIVE | CREASE ENABLED</div>
    </div>
    <div id="msg">GOAL!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        let score = 0, hasPuck = false, isShooting = false;
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.PointLight(0xffffff, 1, 150);
        light.position.set(0, 30, 0);
        scene.add(light);

        // Ice
        const ice = new THREE.Mesh(new THREE.PlaneGeometry(60, 120), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
        ice.rotation.x = -Math.PI/2;
        scene.add(ice);
        ice.add(new THREE.GridHelper(120, 30, 0xff0000, 0x222222).rotateX(Math.PI/2));

        // --- THE CREASE ---
        const creaseGeo = new THREE.CircleGeometry(8, 32, 0, Math.PI);
        const creaseMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
        const crease = new THREE.Mesh(creaseGeo, creaseMat);
        crease.rotation.x = -Math.PI / 2;
        crease.position.set(0, 0.02, -55);
        scene.add(crease);

        // Net
        const net = new THREE.Mesh(new THREE.BoxGeometry(12, 6, 2), new THREE.MeshStandardMaterial({ color: 0xffffff, wireframe: true }));
        net.position.set(0, 3, -55);
        scene.add(net);

        function createPlayer(col) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 1), new THREE.MeshStandardMaterial({ color: col }));
            body.position.y = 1.25; group.add(body);
            const stick = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 0.2), new THREE.MeshStandardMaterial({ color: 0x888888 }));
            stick.position.set(1, 0.5, -1); stick.rotation.x = Math.PI/4;
            group.add(stick);
            return group;
        }

        const player = createPlayer(0xff0000); player.position.set(0, 0, 40); scene.add(player);
        
        // BETTER GOALIE
        const goalie = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 2), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x002222 }));
        goalie.position.set(0, 2, -54); // Fixed depth in the crease
        scene.add(goalie);

        // Chaos Drones
        const drones = [];
        for(let i=0; i<3; i++) {
            const d = new THREE.Mesh(new THREE.OctahedronGeometry(1.5), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            d.position.set((i-1)*15, 2, -10);
            scene.add(d);
            drones.push({ mesh: d, xDir: Math.random() > 0.5 ? 1 : -1, zDir: Math.random() > 0.5 ? 1 : -1 });
        }

        const puck = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.3, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        puck.position.set(0, 0.3, 0); scene.add(puck);

        function reset() {
            hasPuck = false; isShooting = false;
            puck.position.set(0, 0.3, 0);
            player.position.set(0, 0, 40);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const speed = 0.6;
            if(keys['KeyW'] || keys['ArrowUp']) player.position.z -= speed;
            if(keys['KeyS'] || keys['ArrowDown']) player.position.z += speed;
            if(keys['KeyA'] || keys['ArrowLeft']) player.position.x -= speed;
            if(keys['KeyD'] || keys['ArrowRight']) player.position.x += speed;

            camera.position.set(player.position.x, 35, player.position.z + 45);
            camera.lookAt(player.position.x, 0, player.position.z - 10);

            // --- SMART GOALIE AI ---
            // He only moves within the net width (-5 to 5) and tracks the puck position
            let targetX = THREE.MathUtils.clamp(puck.position.x, -5, 5);
            goalie.position.x = THREE.MathUtils.lerp(goalie.position.x, targetX, 0.15);

            drones.forEach(d => {
                d.mesh.position.x += 0.3 * d.xDir;
                d.mesh.position.z += 0.1 * d.zDir;
                if(Math.abs(d.mesh.position.x) > 25) d.xDir *= -1;
                if(Math.abs(d.mesh.position.z) > 15) d.zDir *= -1;
                if(player.position.distanceTo(d.mesh.position) < 3.5 && hasPuck) reset();
            });

            if(!hasPuck && !isShooting && player.position.distanceTo(puck.position) < 3.5) hasPuck = true;

            if(keys['Space'] && hasPuck) { hasPuck = false; isShooting = true; }

            if(isShooting) {
                puck.position.z -= 2.8;
                // Collision check against Goalie Box
                if(puck.position.distanceTo(goalie.position) < 4.5) reset();
                
                if(puck.position.z < -54 && Math.abs(puck.position.x) < 6) {
                    score++; document.getElementById('points').innerText = score;
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => { document.getElementById('msg').style.display = 'none'; reset(); }, 1000);
                    isShooting = false;
                }
                if(puck.position.z < -80) reset();
            } else if (hasPuck) {
                puck.position.set(player.position.x, 0.3, player.position.z - 3);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
