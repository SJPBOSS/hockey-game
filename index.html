<!DOCTYPE html>
<html>
<head>
    <title>SENTINEL: CINEMATIC ARENA</title>
    <style>
        body { margin: 0; background: #020205; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        #scoreboard { font-size: 2rem; font-weight: 900; border-left: 10px solid #ff0000; padding-left: 15px; letter-spacing: 2px; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-size: 6rem; display: none; text-shadow: 0 0 40px #ff0000; font-style: italic; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreboard">SENTINEL PRO<br><span style="color: #ff0000;">GOALS:</span> <span id="points">0</span></div>
    </div>
    <div id="msg">GOAL!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.012); // Atmosphere
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding; // Better color for mobile
        document.body.appendChild(renderer.domElement);

        // --- CINEMATIC LIGHTING ---
        const amb = new THREE.AmbientLight(0x404040, 0.5); scene.add(amb);
        const spot = new THREE.SpotLight(0xffffff, 2); spot.position.set(0, 50, 0); scene.add(spot);
        const rim = new THREE.PointLight(0xff0000, 1, 100); rim.position.set(0, 10, -50); scene.add(rim);

        // --- REFLECTIVE ICE ---
        const ice = new THREE.Mesh(new THREE.PlaneGeometry(60, 120), new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8, roughness: 0.1 }));
        ice.rotation.x = -Math.PI/2; scene.add(ice);
        ice.add(new THREE.GridHelper(120, 30, 0x330000, 0x111111).rotateX(Math.PI/2));

        // Glass & Boards
        const glass = new THREE.Mesh(new THREE.BoxGeometry(60, 8, 1), new THREE.MeshPhongMaterial({ color: 0x00ffff, transparent: true, opacity: 0.1 }));
        glass.position.set(0, 4, -60); scene.add(glass);

        function createModel(col) {
            const g = new THREE.Group();
            const b = new THREE.Mesh(new THREE.CapsuleGeometry(0.7, 1.2, 4, 8), new THREE.MeshStandardMaterial({ color: col }));
            b.position.y = 1.3; g.add(b);
            const s = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 0.2), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            s.position.set(1.2, 0.5, -1.2); s.rotation.x = 0.8; g.add(s);
            return g;
        }

        const player = createModel(0xff0000); player.position.set(0, 0, 40); scene.add(player);
        const goalie = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 2), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x002222 }));
        goalie.position.set(0, 2, -54); scene.add(goalie);

        const puck = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.3, 32), new THREE.MeshStandardMaterial({ color: 0x000000 }));
        puck.position.set(0, 10, 0); scene.add(puck);

        let pVelX = 0, pVelZ = 0, score = 0, hasPuck = false, isShooting = false;
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function reset() {
            hasPuck = false; isShooting = false;
            puck.position.set(0, 15, 0);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (puck.position.y > 0.3) puck.position.y -= 0.2;

            // Physics with Friction
            if(keys['KeyW'] || keys['ArrowUp']) pVelZ -= 0.05;
            if(keys['KeyS'] || keys['ArrowDown']) pVelZ += 0.05;
            if(keys['KeyA'] || keys['ArrowLeft']) pVelX -= 0.05;
            if(keys['KeyD'] || keys['ArrowRight']) pVelX += 0.05;
            pVelX *= 0.96; pVelZ *= 0.96;
            player.position.x += pVelX; player.position.z += pVelZ;

            camera.position.set(player.position.x, 38, player.position.z + 45);
            camera.lookAt(player.position.x, 0, player.position.z - 10);

            goalie.position.x = THREE.MathUtils.lerp(goalie.position.x, THREE.MathUtils.clamp(puck.position.x, -8, 8), 0.1);

            if(!hasPuck && !isShooting && player.position.distanceTo(puck.position) < 3.5 && puck.position.y < 1) hasPuck = true;
            if(keys['Space'] && hasPuck) { hasPuck = false; isShooting = true; }

            if(isShooting) {
                puck.position.z -= 2.8;
                if(puck.position.distanceTo(goalie.position) < 4.5) reset();
                if(puck.position.z < -54 && Math.abs(puck.position.x) < 7) {
                    score++; document.getElementById('points').innerText = score;
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => { document.getElementById('msg').style.display = 'none'; reset(); }, 1000);
                    isShooting = false;
                }
                if(puck.position.z < -80) reset();
            } else if (hasPuck) {
                puck.position.set(player.position.x, 0.3, player.position.z - 3.5);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
