<!DOCTYPE html>
<html>
<head>
    <title>SENTINEL HOCKEY: FINAL FIX</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; z-index: 5; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: red; font-size: 50px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="points">0</span><br>ARROWS TO MOVE | SPACE TO SHOOT</div>
    <div id="msg">GOAL!</div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

    <script>
        // Check if the engine loaded
        if (typeof THREE === 'undefined') {
            document.body.innerHTML = "<h2 style='color:white; text-align:center;'>Engine Error: Refresh the page</h2>";
        }

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Light
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Rink
        const ice = new THREE.Mesh(new THREE.PlaneGeometry(50, 100), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        ice.rotation.x = -Math.PI / 2;
        scene.add(ice);

        // Boards (The side walls you were missing)
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const wallL = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 100), wallMat);
        wallL.position.set(-25, 1.5, 0);
        scene.add(wallL);
        const wallR = wallL.clone();
        wallR.position.x = 25;
        scene.add(wallR);

        // Player & Stick
        const player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 1), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        body.position.y = 1.25;
        player.add(body);
        const stick = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 0.2), new THREE.MeshStandardMaterial({ color: 0x888888 }));
        stick.position.set(1, 0, -1);
        stick.rotation.x = 0.5;
        player.add(stick);
        player.position.z = 30;
        scene.add(player);

        // Goalie
        const goalie = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 1), new THREE.MeshStandardMaterial({ color: 0x00ffff }));
        goalie.position.set(0, 1.5, -40);
        scene.add(goalie);

        // Puck
        const puck = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        puck.position.y = 0.5;
        scene.add(puck);

        camera.position.set(0, 30, 60);
        camera.lookAt(0, 0, 0);

        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        let score = 0;
        let shooting = false;

        function animate() {
            requestAnimationFrame(animate);

            // Movement
            if (keys['ArrowUp'] || keys['KeyW']) player.position.z -= 0.5;
            if (keys['ArrowDown'] || keys['KeyS']) player.position.z += 0.5;
            if (keys['ArrowLeft'] || keys['KeyA']) player.position.x -= 0.5;
            if (keys['ArrowRight'] || keys['KeyD']) player.position.x += 0.5;

            // Camera follows player (Static height to prevent sickness)
            camera.position.x = player.position.x;
            camera.position.z = player.position.z + 30;

            // Goalie Logic
            goalie.position.x = Math.sin(Date.now() * 0.002) * 10;

            // Puck Logic
            if (!shooting) {
                puck.position.x = player.position.x;
                puck.position.z = player.position.z - 2;
                if (keys['Space']) shooting = true;
            } else {
                puck.position.z -= 1.5;
                // Collision with Goalie
                if (puck.position.distanceTo(goalie.position) < 3) shooting = false;
                // Goal Score
                if (puck.position.z < -42) {
                    score++;
                    document.getElementById('points').innerText = score;
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => { document.getElementById('msg').style.display = 'none'; }, 1000);
                    shooting = false;
                }
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
