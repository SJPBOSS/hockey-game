<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL ARENA: LEVEL 3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', sans-serif; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #ff0000; text-shadow: 0 0 10px #ff0000; pointer-events: none;
        }
        #scoreboard { font-size: 2rem; margin-top: 10px; }
        #instructions {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: #ff0000; font-size: 1rem; text-shadow: 0 0 5px #ff0000;
        }
        #msg {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: #fff; font-size: 4rem; display: none; text-shadow: 0 0 20px #ff0000;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>SENTINEL ARENA</h1>
        <div id="scoreboard">SCORE: <span id="points">0</span></div>
    </div>
    <div id="msg">GOAL DETECTED</div>
    <div id="instructions">WASD TO MOVE | SPACE TO FIRE</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Score tracking
        let score = 0;

        // Lighting
        scene.add(new THREE.AmbientLight(0x202020));
        const spot = new THREE.SpotLight(0xff0000, 2);
        spot.position.set(0, 20, 0);
        scene.add(spot);

        // Rink & Walls
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(20, 40), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        floor.add(new THREE.GridHelper(40, 20, 0xff0000, 0x110000).rotateX(Math.PI/2));

        const wallMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x550000 });
        const sideWallL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2, 40), wallMat);
        sideWallL.position.set(-10, 1, 0);
        scene.add(sideWallL);
        const sideWallR = sideWallL.clone();
        sideWallR.position.x = 10;
        scene.add(sideWallR);

        // Goal
        const goal = new THREE.Mesh(new THREE.BoxGeometry(7, 4, 1), new THREE.MeshStandardMaterial({ color: 0xff0000, wireframe: true }));
        goal.position.set(0, 2, -19);
        scene.add(goal);

        // Player & Goalie
        const player = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 1.2), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        player.position.set(0, 1, 15);
        scene.add(player);

        const goalie = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 1), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff }));
        goalie.position.set(0, 1.25, -17);
        scene.add(goalie);

        const puck = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 0.2, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff }));
        scene.add(puck);

        camera.position.set(0, 12, 22);
        camera.lookAt(0, 0, -5);

        // Logic
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        let isShooting = false;
        let gDir = 1;

        function animate() {
            requestAnimationFrame(animate);

            // Movement with Boundary Checks
            if ((keys['KeyW'] || keys['ArrowUp']) && player.position.z > -18) player.position.z -= 0.25;
            if ((keys['KeyS'] || keys['ArrowDown']) && player.position.z < 18) player.position.z += 0.25;
            if ((keys['KeyA'] || keys['ArrowLeft']) && player.position.x > -9) player.position.x -= 0.25;
            if ((keys['KeyD'] || keys['ArrowRight']) && player.position.x < 9) player.position.x += 0.25;

            // Goalie AI
            goalie.position.x += 0.18 * gDir;
            if (Math.abs(goalie.position.x) > 3.5) gDir *= -1;

            if (keys['Space'] && !isShooting) {
                isShooting = true;
                puck.position.copy(player.position);
            }

            if (isShooting) {
                puck.position.z -= 1.0;
                
                // Collision
                if (puck.position.distanceTo(goalie.position) < 2) {
                    isShooting = false;
                    puck.position.set(0, -10, 0);
                }

                // Goal Score
                if (puck.position.z < -18.5 && Math.abs(puck.position.x) < 3.5) {
                    isShooting = false;
                    score++;
                    document.getElementById('points').innerText = score;
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => document.getElementById('msg').style.display = 'none', 1000);
                    puck.position.set(0, -10, 0);
                }
                if (puck.position.z < -25) isShooting = false;
            } else {
                puck.position.set(player.position.x, 0.2, player.position.z - 1.2);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
