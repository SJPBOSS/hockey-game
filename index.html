<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel Slapshot: Ultra Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #010101; color: #0ff; font-family: monospace; }
        #debug { position: absolute; top: 10px; left: 10px; z-index: 100; pointer-events: none; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>
    <div id="debug">SYSTEM INITIALIZING...</div>
    
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <script>
        window.onload = () => {
            const debug = document.getElementById('debug');
            try {
                if (typeof THREE === 'undefined') throw new Error("THREE.js failed to load from CDN");

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);

                // Quick visual check: The Grid
                scene.add(new THREE.GridHelper(20, 20, 0x00ffff, 0x333333));
                scene.add(new THREE.AmbientLight(0xffffff, 0.5));

                const player = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
                player.position.y = 0.5;
                scene.add(player);

                camera.position.set(0, 10, 10);
                camera.lookAt(0, 0, 0);

                function animate() {
                    requestAnimationFrame(animate);
                    renderer.render(scene, camera);
                }
                animate();
                debug.innerHTML = "SENTINEL SYSTEM: ONLINE";
            } catch (e) {
                debug.style.color = "red";
                debug.innerHTML = "FATAL ERROR: " + e.message;
            }
        };
    </script>
</body>
</html>
