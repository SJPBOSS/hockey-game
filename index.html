<!DOCTYPE html>
<html>
<head>
    <title>SENTINEL ARENA: PRO SIM STABLE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        #scoreboard { font-size: 2rem; border-left: 8px solid #ff0000; padding-left: 15px; text-transform: uppercase; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-size: 6rem; display: none; text-shadow: 0 0 30px #ff0000; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreboard">SENTINEL PRO<br><span id="points" style="color:#ff0000">0</span> GOALS</div>
    </div>
    <div id="msg">GOAL!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Lighting (Simple but effective)
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(5, 10, 7.5);
        scene.add(sun);

        // 3. The Rink (Solid and Visible)
        const ice = new THREE.Mesh(new THREE.PlaneGeometry(60, 120), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        ice.rotation.x = -Math.PI / 2;
        scene.add(ice);

        // Center Red Line
        const redLine = new THREE.Mesh(new THREE.PlaneGeometry(60, 1), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
        redLine.rotation.x = -Math.PI/2;
        redLine.position.y = 0.01;
        scene.add(redLine);

        // 4. Player & Stick (Using Standard Boxes for Stability)
        const player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 1), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        body.position.y = 1.25;
        player.add(body);
        
        const stick = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 0.2), new THREE.MeshStandardMaterial({ color: 0x555555 }));
        stick.position.set(1, 0, -1);
        stick.rotation.x = 0.6;
        player.add(stick);
        
        player.position.z = 40;
        scene.add(player);

        // 5. Goalie
        const goalie = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 1.5), new THREE.MeshStandardMaterial({ color: 0x00ffff }));
        goalie.position.set(0, 2, -55);
        scene.add(goalie);

        // 6. Puck
        const puck = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        puck.position.y = 0.6;
        scene.add(puck);

        // 7. Input & Physics
        const keys = {};
        let pVelX = 0, pVelZ = 0, score = 0, shooting = false;
        
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function reset() {
            shooting = false;
            puck.position.set(0, 0.6, 0);
            player.position.set(0, 0, 40);
            pVelX = 0; pVelZ = 0;
        }

        function animate() {
            requestAnimationFrame(animate);

            // REALISTIC HOCKEY PHYSICS
            const accel = 0.04;
            const friction = 0.97; // This provides the "glide" feel

            if(keys['ArrowUp'] || keys['KeyW']) pVelZ -= accel;
            if(keys['ArrowDown'] || keys['KeyS']) pVelZ += accel;
            if(keys['ArrowLeft'] || keys['KeyA']) pVelX -= accel;
            if(keys['ArrowRight'] || keys['KeyD']) pVelX += accel;

            pVelX *= friction;
            pVelZ *= friction;
            player.position.x += pVelX;
            player.position.z += pVelZ;

            // Stable Broadcast Camera
            camera.position.set(player.position.x, 35, player.position.z + 40);
            camera.lookAt(player.position.x, 0, player.position.z - 10);

            // Goalie AI
            goalie.position.x = Math.sin(Date.now() * 0.002) * 12;

            // Stick Handling & Shooting
            if (!shooting) {
                puck.position.x = player.position.x;
                puck.position.z = player.position.z - 3;
                if (keys['Space']) shooting = true;
            } else {
                puck.position.z -= 2;
                if (puck.position.distanceTo(goalie.position) < 4) reset();
                if (puck.position.z < -55 && Math.abs(puck.position.x) < 8) {
                    score++;
                    document.getElementById('points').innerText = score;
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => { document.getElementById('msg').style.display = 'none'; reset(); }, 1000);
                    shooting = false;
                }
                if (puck.position.z < -80) reset();
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
