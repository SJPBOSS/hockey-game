<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL ARENA: PROGRESSION</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px #ff0000; pointer-events: none; z-index: 10; }
        #scoreboard { font-size: 2.5rem; border-left: 5px solid #ff0000; padding-left: 15px; }
        #level-ui { font-size: 1.2rem; color: #00ffff; margin-top: 5px; }
        #status { color: #ff0000; font-size: 1rem; margin-top: 10px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 4px; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: #fff; font-size: 6rem; display: none; text-shadow: 0 0 30px #ff0000; font-style: italic; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreboard">SCORE: <span id="points">0</span></div>
        <div id="level-ui">LEVEL: <span id="lvl-num">1</span></div>
        <div id="status">INITIATING...</div>
    </div>
    <div id="msg">LEVEL UP!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        let score = 0;
        let level = 1;
        let hasPuck = false;
        let isShooting = false;
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const light = new THREE.PointLight(0xff0000, 2, 100);
        light.position.set(0, 20, 0);
        scene.add(light);

        // Rink
        const ice = new THREE.Mesh(new THREE.PlaneGeometry(35, 75), new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 0.9, roughness: 0.05 }));
        ice.rotation.x = -Math.PI / 2;
        scene.add(ice);
        ice.add(new THREE.GridHelper(75, 25, 0xff0000, 0x220000).rotateX(Math.PI/2));

        // Goal
        const net = new THREE.Mesh(new THREE.BoxGeometry(10, 5, 2), new THREE.MeshStandardMaterial({ color: 0xff0000, wireframe: true }));
        net.position.set(0, 2.5, -34);
        scene.add(net);

        function createModel(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 0.8), new THREE.MeshStandardMaterial({ color }));
            body.position.y = 1; group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0xdddddd }));
            head.position.y = 2.4; group.add(head);
            return group;
        }

        const player = createModel(0xff0000);
        player.position.set(0, 0, 25);
        scene.add(player);

        const goalie = createModel(0x00ffff);
        goalie.scale.set(1.8, 1.2, 1);
        goalie.position.set(0, 0, -32);
        scene.add(goalie);

        const drones = [];
        for(let i=0; i<3; i++) {
            const drone = new THREE.Mesh(new THREE.OctahedronGeometry(1), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 }));
            drone.position.set((i-1)*10, 2, -10);
            scene.add(drone);
            drones.push({ mesh: drone, xDir: Math.random() > 0.5 ? 1 : -1, zDir: 1 });
        }

        const puck = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.4, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x444444 }));
        scene.add(puck);

        function resetPuck() {
            hasPuck = false; isShooting = false;
            puck.position.set(0, 20, 0);
            document.getElementById('status').innerText = 'FACE-OFF: GET TO THE CENTER';
        }
        resetPuck();

        function animate() {
            requestAnimationFrame(animate);

            // Leveling Logic
            level = Math.floor(score / 3) + 1;
            document.getElementById('lvl-num').innerText = level;

            const playerSpeed = 0.45;
            if (keys['KeyW'] || keys['ArrowUp']) player.position.z -= playerSpeed;
            if (keys['KeyS'] || keys['ArrowDown']) player.position.z += playerSpeed;
            if (keys['KeyA'] || keys['ArrowLeft']) player.position.x -= playerSpeed;
            if (keys['KeyD'] || keys['ArrowRight']) player.position.x += playerSpeed;

            camera.position.lerp(new THREE.Vector3(player.position.x, 20, player.position.z + 22), 0.1);
            camera.lookAt(player.position.x, 0, player.position.z - 8);

            // Aggressive Goalie
            let goalieReact = 0.05 + (level * 0.02);
            let gTarget = isShooting ? puck.position.x : player.position.x;
            goalie.position.x = THREE.MathUtils.lerp(goalie.position.x, THREE.MathUtils.clamp(gTarget, -4, 4), goalieReact);

            // Chaos Drones
            drones.forEach(d => {
                let dSpeed = 0.15 + (level * 0.05);
                d.mesh.position.x += dSpeed * d.xDir;
                d.mesh.position.z += (dSpeed * 0.5) * d.zDir;

                if(Math.abs(d.mesh.position.x) > 15) d.xDir *= -1;
                if(Math.abs(d.mesh.position.z) > 15) d.zDir *= -1;
                
                if(player.position.distanceTo(d.mesh.position) < 2.8 && hasPuck) {
                    resetPuck();
                    document.getElementById('status').innerText = 'SENTINEL INTERCEPTED CORE!';
                }
            });

            if (puck.position.y > 0.3) puck.position.y -= 0.3;

            if(!hasPuck && !isShooting && player.position.distanceTo(puck.position) < 2.5 && puck.position.y < 1) {
                hasPuck = true;
                document.getElementById('status').innerText = 'CORE ACQUIRED - STRIKE NOW!';
            }

            if (keys['Space'] && hasPuck) { hasPuck = false; isShooting = true; }

            if (isShooting) {
                puck.position.z -= (1.8 + level * 0.2);
                if (puck.position.distanceTo(goalie.position) < 3.5) { resetPuck(); document.getElementById('status').innerText = 'GOALIE BLOCKED SHOT'; }
                if (puck.position.z < -34 && Math.abs(puck.position.x) < 5) {
                    score++;
                    document.getElementById('points').innerText = score;
                    if(score % 3 === 0) {
                        document.getElementById('msg').style.display = 'block';
                        setTimeout(() => document.getElementById('msg').style.display = 'none', 1000);
                    }
                    isShooting = false; puck.position.y = -50;
                    setTimeout(resetPuck, 1000);
                }
                if (puck.position.z < -60) resetPuck();
            } else if (hasPuck) {
                puck.position.set(player.position.x, 0.3, player.position.z - 1.8);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
