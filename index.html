<!DOCTYPE html>
<html>
<head>
    <title>SENTINEL ARENA: EVOLUTION</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        #scoreboard { font-size: 2.5rem; border-left: 5px solid #ff0000; padding-left: 15px; }
        #level-info { font-size: 1.2rem; color: #00ffff; margin-top: 5px; text-transform: uppercase; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-size: 5rem; display: none; text-shadow: 0 0 20px #ff0000; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreboard">SCORE: <span id="points">0</span></div>
        <div id="level-info">LEVEL: <span id="lvl">1</span></div>
    </div>
    <div id="msg">GOAL!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        let score = 0, level = 1, hasPuck = false, isShooting = false;
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const sun = new THREE.PointLight(0xffffff, 1, 150);
        sun.position.set(0, 30, 0);
        scene.add(sun);

        // Ice
        const ice = new THREE.Mesh(new THREE.PlaneGeometry(60, 120), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
        ice.rotation.x = -Math.PI/2;
        scene.add(ice);
        const grid = new THREE.GridHelper(120, 30, 0xff0000, 0x222222);
        grid.rotation.x = Math.PI/2;
        ice.add(grid);

        // Net
        const net = new THREE.Mesh(new THREE.BoxGeometry(14, 6, 2), new THREE.MeshStandardMaterial({ color: 0xffffff, wireframe: true }));
        net.position.set(0, 3, -55);
        scene.add(net);

        function createPlayer(col) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 1), new THREE.MeshStandardMaterial({ color: col }));
            body.position.y = 1.25; group.add(body);
            const stick = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 0.2), new THREE.MeshStandardMaterial({ color: 0x888888 }));
            stick.position.set(1, 0.5, -1); stick.rotation.x = Math.PI/4;
            group.add(stick);
            return group;
        }

        const player = createPlayer(0xff0000); player.position.set(0, 0, 40); scene.add(player);
        const goalie = new THREE.Mesh(new THREE.BoxGeometry(5.5, 4, 1.5), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x001111 }));
        goalie.position.set(0, 2, -54.5); 
        scene.add(goalie);

        const drones = [];
        for(let i=0; i<2; i++) {
            const d = new THREE.Mesh(new THREE.OctahedronGeometry(1.5), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            d.position.set(i === 0 ? -15 : 15, 2, -10);
            scene.add(d);
            drones.push({ mesh: d, xDir: i === 0 ? 1 : -1 });
        }

        const puck = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.3, 32), new THREE.MeshStandardMaterial({ color: 0xffffff }));
        puck.position.set(0, 0.3, 0); scene.add(puck);

        function reset() {
            hasPuck = false; isShooting = false;
            puck.position.set(0, 0.3, 0);
            player.position.set(0, 0, 40);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Progression Logic
            level = Math.floor(score / 5) + 1;
            document.getElementById('lvl').innerText = level;

            // Level-based atmosphere
            if (level === 2) sun.color.setHex(0xffff00); // Yellow
            if (level >= 3) sun.color.setHex(0xff0000); // Red Danger

            const speed = 0.55;
            if(keys['KeyW'] || keys['ArrowUp']) player.position.z -= speed;
            if(keys['KeyS'] || keys['ArrowDown']) player.position.z += speed;
            if(keys['KeyA'] || keys['ArrowLeft']) player.position.x -= speed;
            if(keys['KeyD'] || keys['ArrowRight']) player.position.x += speed;

            camera.position.set(player.position.x, 35, player.position.z + 45);
            camera.lookAt(player.position.x, 0, player.position.z - 10);

            // Goalie AI scales with level
            let goalieSpeed = 0.08 + (level * 0.01);
            let targetX = THREE.MathUtils.clamp(puck.position.x, -6, 6);
            goalie.position.x = THREE.MathUtils.lerp(goalie.position.x, targetX, goalieSpeed);

            // Drones scale with level
            drones.forEach(d => {
                d.mesh.position.x += (0.25 + (level * 0.05)) * d.xDir;
                if(Math.abs(d.mesh.position.x) > 22) d.xDir *= -1;
                if(player.position.distanceTo(d.mesh.position) < 3.2 && hasPuck) reset();
            });

            if(!hasPuck && !isShooting && player.position.distanceTo(puck.position) < 3.5) hasPuck = true;
            if(keys['Space'] && hasPuck) { hasPuck = false; isShooting = true; }

            if(isShooting) {
                puck.position.z -= 2.6;
                if(puck.position.distanceTo(goalie.position) < 4.2) reset();
                if(puck.position.z < -54 && Math.abs(puck.position.x) < 7) {
                    score++;
                    document.getElementById('points').innerText = score;
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => { document.getElementById('msg').style.display = 'none'; reset(); }, 1000);
                    isShooting = false;
                }
                if(puck.position.z < -80) reset();
            } else if (hasPuck) {
                puck.position.set(player.position.x, 0.3, player.position.z - 3);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
