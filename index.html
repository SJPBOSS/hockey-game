<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL ARENA: OVERDRIVE</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; text-shadow: 2px 2px #ff0000; pointer-events: none; z-index: 10; }
        #scoreboard { font-size: 2.5rem; border-left: 5px solid #ff0000; padding-left: 15px; }
        #status { color: #ff0000; font-size: 1rem; margin-top: 10px; background: rgba(0,0,0,0.7); padding: 8px; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: #fff; font-size: 6rem; display: none; text-shadow: 0 0 30px #ff0000; font-style: italic; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreboard">SCORE: <span id="points">0</span></div>
        <div id="status">PRESS 'C' TO CHANGE JERSEYS</div>
    </div>
    <div id="msg">GOAL!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        let score = 0;
        let hasPuck = false;
        let isShooting = false;
        let powerUpActive = false;
        let jerseyIndex = 0;
        const jerseys = [0xff0000, 0xffffff, 0x111111];

        const keys = {};
        window.onkeydown = (e) => {
            keys[e.code] = true;
            if(e.code === 'KeyC') {
                jerseyIndex = (jerseyIndex + 1) % jerseys.length;
                player.children[0].material.color.setHex(jerseys[jerseyIndex]);
            }
        };
        window.onkeyup = (e) => keys[e.code] = false;

        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const spot = new THREE.PointLight(0xff0000, 2, 100);
        spot.position.set(0, 20, 0);
        scene.add(spot);

        // Ice with Scuff Logic
        const ice = new THREE.Mesh(new THREE.PlaneGeometry(40, 80), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, metalness: 0.8, roughness: 0.1 }));
        ice.rotation.x = -Math.PI / 2;
        scene.add(ice);

        // PowerUp Orb
        const pUp = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffd700 }));
        pUp.position.set(100, 1, 0);
        scene.add(pUp);

        function createModel(color) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2, 0.8), new THREE.MeshStandardMaterial({ color }));
            body.position.y = 1; group.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), new THREE.MeshStandardMaterial({ color: 0xdddddd }));
            head.position.y = 2.4; group.add(head);
            return group;
        }

        const player = createModel(0xff0000);
        scene.add(player);
        const goalie = createModel(0x00ffff);
        goalie.scale.set(2, 1.2, 1);
        scene.add(goalie);

        const drones = [];
        for(let i=0; i<3; i++) {
            const d = new THREE.Mesh(new THREE.OctahedronGeometry(1.2), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 }));
            scene.add(d);
            drones.push({ mesh: d, xDir: Math.random() - 0.5, zDir: Math.random() - 0.5 });
        }

        const puck = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.4, 32), new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x444444 }));
        scene.add(puck);

        function reset() {
            hasPuck = false; isShooting = false;
            puck.position.set(0, 15, 0);
            player.position.set(0, 0, 25);
            goalie.position.set(0, 0, -35);
            if(Math.random() > 0.7) pUp.position.set((Math.random()-0.5)*20, 1, (Math.random()-0.5)*20);
        }
        reset();

        function animate() {
            requestAnimationFrame(animate);
            let speed = powerUpActive ? 0.7 : 0.4;
            
            if (keys['KeyW']) player.position.z -= speed;
            if (keys['KeyS']) player.position.z += speed;
            if (keys['KeyA']) player.position.x -= speed;
            if (keys['KeyD']) player.position.x += speed;

            camera.position.lerp(new THREE.Vector3(player.position.x, 18, player.position.z + 20), 0.1);
            camera.lookAt(player.position.x, 0, player.position.z - 5);

            // Powerup Logic
            if(player.position.distanceTo(pUp.position) < 2) {
                powerUpActive = true;
                pUp.position.y = -100;
                document.getElementById('status').innerText = 'OVERDRIVE ACTIVE!';
                setTimeout(() => { powerUpActive = false; document.getElementById('status').innerText = 'OVERDRIVE EXPIRED'; }, 5000);
            }

            // Drones
            drones.forEach(d => {
                d.mesh.position.x += 0.2 * d.xDir; d.mesh.position.z += 0.2 * d.zDir;
                if(Math.abs(d.mesh.position.x) > 18) d.xDir *= -1;
                if(Math.abs(d.mesh.position.z) > 30) d.zDir *= -1;
                if(player.position.distanceTo(d.mesh.position) < 2.5 && hasPuck && !powerUpActive) reset();
            });

            // Goalie
            let gTarget = isShooting ? puck.position.x : player.position.x;
            goalie.position.x = THREE.MathUtils.lerp(goalie.position.x, THREE.MathUtils.clamp(gTarget, -6, 6), 0.15);

            if(puck.position.y > 0.3) puck.position.y -= 0.2;
            if(!hasPuck && !isShooting && player.position.distanceTo(puck.position) < 2.5) hasPuck = true;

            if(keys['Space'] && hasPuck) { hasPuck = false; isShooting = true; }

            if(isShooting) {
                puck.position.z -= powerUpActive ? 2.5 : 1.8;
                if(puck.position.distanceTo(goalie.position) < 3.5) reset();
                if(puck.position.z < -36 && Math.abs(puck.position.x) < 6) {
                    score++; document.getElementById('points').innerText = score;
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => { document.getElementById('msg').style.display = 'none'; reset(); }, 1000);
                    isShooting = false;
                }
                if(puck.position.z < -60) reset();
            } else if (hasPuck) {
                puck.position.set(player.position.x, 0.3, player.position.z - 1.8);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
