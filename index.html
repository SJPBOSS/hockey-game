<!DOCTYPE html>
<html>
<head>
    <title>SENTINEL ARENA: PRO-GRADE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 10; pointer-events: none; }
        #scoreboard { font-size: 2rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; border-left: 6px solid #ff0000; padding-left: 15px; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-size: 6rem; display: none; text-shadow: 0 0 30px #ff0000; font-weight: 900; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="scoreboard">SENTINEL PRO<br><span style="color: #ff0000;">SCORE:</span> <span id="points">0</span></div>
    </div>
    <div id="msg">GOAL!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        // Dark blue stadium atmosphere
        scene.fog = new THREE.FogExp2(0x050508, 0.01);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        let score = 0, hasPuck = false, isShooting = false;
        let pVelX = 0, pVelZ = 0;
        const keys = {};

        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        // Pro Lighting Setup
        scene.add(new THREE.AmbientLight(0x404040, 1)); // Soft fill
        const spot = new THREE.SpotLight(0xffffff, 2);
        spot.position.set(0, 50, 0);
        spot.penumbra = 0.5;
        scene.add(spot);

        // --- PRO ICE MATERIAL ---
        const iceMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            metalness: 0.9, 
            roughness: 0.05,
        });
        const ice = new THREE.Mesh(new THREE.PlaneGeometry(60, 120), iceMat);
        ice.rotation.x = -Math.PI/2;
        scene.add(ice);

        // Center Logo Area (Representing the Capitals circle)
        const centerCircle = new THREE.Mesh(
            new THREE.RingGeometry(9.8, 10, 64),
            new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide })
        );
        centerCircle.rotation.x = -Math.PI/2;
        centerCircle.position.y = 0.01;
        scene.add(centerCircle);

        // Net & Glass
        const boards = new THREE.Mesh(new THREE.BoxGeometry(60, 4, 1), new THREE.MeshStandardMaterial({ color: 0xdddddd }));
        boards.position.set(0, 2, -60); scene.add(boards);

        // High-End Character
        function createProPlayer(col) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.7, 1.2, 4, 8), new THREE.MeshStandardMaterial({ color: col, roughness: 0.3 }));
            body.position.y = 1.3; group.add(body);
            
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            head.position.y = 2.6; group.add(head);

            const stick = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 0.2), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            stick.position.set(1.1, 0.5, -1); stick.rotation.x = Math.PI/4;
            group.add(stick);
            
            const blade = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 0.5), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            blade.position.set(1.1, -1, -2.5); group.add(blade);
            
            return group;
        }

        const player = createProPlayer(0xff0000); scene.add(player);
        const goalie = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 1.5), new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x002222 }));
        goalie.position.set(0, 2, -55); scene.add(goalie);

        const puck = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 0.3, 32), new THREE.MeshStandardMaterial({ color: 0x000000 }));
        puck.position.set(0, 0.15, 0); scene.add(puck);

        function resetPuck() {
            hasPuck = false; isShooting = false;
            puck.position.set(0, 0.15, 0);
            player.position.set(0, 0, 40);
            pVelX = 0; pVelZ = 0;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // PHYSICS: Acceleration + Friction
            const accel = 0.04;
            const friction = 0.97; // This is what makes you stop!
            
            if(keys['KeyW'] || keys['ArrowUp']) pVelZ -= accel;
            if(keys['KeyS'] || keys['ArrowDown']) pVelZ += accel;
            if(keys['KeyA'] || keys['ArrowLeft']) pVelX -= accel;
            if(keys['KeyD'] || keys['ArrowRight']) pVelX += accel;
            
            pVelX *= friction;
            pVelZ *= friction;
            
            player.position.x += pVelX;
            player.position.z += pVelZ;

            // Camera: Solid and Stable (Broadcasting style)
            camera.position.set(player.position.x, 38, player.position.z + 45);
            camera.lookAt(player.position.x, 0, player.position.z - 10);

            // Goalie AI (Smoothing its movement)
            const gTarget = Math.sin(Date.now() * 0.0015) * 12;
            goalie.position.x = THREE.MathUtils.lerp(goalie.position.x, gTarget, 0.1);

            if(!hasPuck && !isShooting && player.position.distanceTo(puck.position) < 3.5) hasPuck = true;

            if(keys['Space'] && hasPuck) { hasPuck = false; isShooting = true; }

            if(isShooting) {
                puck.position.z -= 2.8;
                if(puck.position.distanceTo(goalie.position) < 4.5) resetPuck();
                if(puck.position.z < -55 && Math.abs(puck.position.x) < 8) {
                    score++; document.getElementById('points').innerText = score;
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => { document.getElementById('msg').style.display = 'none'; resetPuck(); }, 1000);
                    isShooting = false;
                }
                if(puck.position.z < -90) resetPuck();
            } else if (hasPuck) {
                puck.position.set(player.position.x, 0.15, player.position.z - 3.5);
            }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
