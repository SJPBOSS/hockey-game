<!DOCTYPE html>
<html>
<head>
    <title>Sentinel Slapshot: Ultra Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #0ff; font-family: 'Courier New', Courier, monospace; }
        #overlay { position: absolute; width: 100%; text-align: center; top: 20%; pointer-events: none; font-size: 3em; display: none; text-shadow: 0 0 20px #0ff; }
        #stats { position: absolute; top: 10px; left: 10px; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="stats">SCORE: <span id="score">0</span> | AI AGGRESSION: MAX</div>
    <div id="overlay">GOAL!</div>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script>
        let score = 0;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambient = new THREE.AmbientLight(0xffffff, 0.4);
        const point = new THREE.PointLight(0x00ffff, 1, 100);
        point.position.set(0, 10, 0);
        scene.add(ambient, point);

        // Rink & Goals
        const rink = new THREE.Mesh(new THREE.PlaneGeometry(20, 30), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        rink.rotation.x = -Math.PI / 2;
        scene.add(rink);

        // Entities
        const player = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        player.position.y = 0.5;
        scene.add(player);

        const ai = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({ color: 0x0000ff }));
        ai.position.set(0, 0.5, -10);
        scene.add(ai);

        const puck = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshStandardMaterial({ color: 0xffff00 }));
        puck.position.y = 0.3;
        let puckVel = new THREE.Vector3(0, 0, 0);
        scene.add(puck);

        // Controls
        const keys = {};
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        function animate() {
            requestAnimationFrame(animate);

            // Player Move
            if (keys['w']) player.position.z -= 0.15;
            if (keys['s']) player.position.z += 0.15;
            if (keys['a']) player.position.x -= 0.15;
            if (keys['d']) player.position.x += 0.15;

            // ULTRA INTERCEPT AI
            let target = puck.position.clone();
            const aiToPuck = new THREE.Vector3().subVectors(target, ai.position).normalize();
            ai.position.x += aiToPuck.x * 0.1;
            ai.position.z += aiToPuck.z * 0.1;

            // Collision & Steal
            if (player.position.distanceTo(puck.position) < 1) {
                puckVel.set((puck.position.x - player.position.x) * 0.2, 0, (puck.position.z - player.position.z) * 0.2);
            }
            if (ai.position.distanceTo(puck.position) < 1) {
                puckVel.set(aiToPuck.x * -0.3, 0, aiToPuck.z * -0.3); // AI Steal
            }

            puck.position.add(puckVel);
            puckVel.multiplyScalar(0.98);

            // Goal Detection
            if (puck.position.z < -14.5) {
                score++;
                document.getElementById('score').innerText = score;
                puck.position.set(0, 0.3, 0);
                puckVel.set(0,0,0);
                document.getElementById('overlay').style.display = 'block';
                setTimeout(() => document.getElementById('overlay').style.display = 'none', 1000);
            }

            renderer.render(scene, camera);
        }
        camera.position.set(0, 15, 15);
        camera.lookAt(0, 0, 0);
        animate();
    </script>
</body>
</html>
